<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลาออนไลน์</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-[#f4f6fa] text-slate-800 antialiased pb-24">

    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="w-10 h-10 border-4 border-slate-200 border-t-[#1e40af] rounded-full animate-spin"></div>
        <p class="mt-3 text-slate-400 text-xs">กำลังโหลดข้อมูลระบบ...</p>
    </div>

    <div class="bg-[#1e40af] text-white px-5 py-4 flex items-center gap-3 shadow-sm">
        <img id="userPicture" src="https://via.placeholder.com/150" alt="Avatar" class="w-12 h-12 rounded-2xl border border-white/20 object-cover bg-white">
        <div>
            <h1 class="text-xs text-blue-200 tracking-wide">ระบบยื่นคำขอลาออนไลน์</h1>
            <p id="userName" class="text-sm font-semibold mt-0.5">กำลังโหลดชื่อ...</p>
            <p id="userSubInfo" class="text-[11px] text-blue-100 opacity-90 mt-0.5">แผนก: - | ตำแหน่ง: -</p>
        </div>
    </div>

    <main class="px-4 py-4 max-w-md mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h2 class="text-base font-bold text-slate-800 mb-4">ยื่นใบลา</h2>
            <form id="leaveForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">ประเภทการลา</label>
                    <select id="leaveType" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                        <option value="ลาป่วย">ลาป่วย</option>
                        <option value="ลากิจ">ลากิจ</option>
                        <option value="ลาพักร้อน">ลาพักร้อน</option>
                    </select>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label id="quotaLabel" class="block text-xs font-medium text-slate-500">คงเหลือ -- วัน</label>
                    </div>
                    <select id="leaveFormat" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                        <option value="เต็มวัน">เต็มวัน</option>
                        <option value="ครึ่งวันเช้า">ครึ่งวันเช้า</option>
                        <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">วันเริ่ม</label>
                        <input type="date" id="startDate" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">วันสิ้นสุด</label>
                        <input type="date" id="endDate" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">จำนวนวันลา (คำนวณอัตโนมัติ)</label>
                    <input type="text" id="totalDays" placeholder="-" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-100 text-right pr-4 text-slate-600 font-semibold" readonly required>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">เหตุผล</label>
                    <textarea id="reason" rows="3" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required></textarea>
                </div>
                <button type="submit" class="w-full bg-[#1e40af] hover:bg-blue-800 text-white font-medium py-3 rounded-xl shadow-sm transition text-sm mt-4">
                    ส่งใบลาไปยังผู้อนุมัติ
                </button>
            </form>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 shadow-lg px-6 py-2 flex justify-between items-center max-w-md mx-auto z-40">
        <button class="flex flex-col items-center gap-1 text-[#1e40af] flex-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="text-[10px] font-medium">ยื่นคำขอ</span>
        </button>
        <button onclick="openHistoryModal()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#1e40af] flex-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-medium">ประวัติการลา</span>
        </button>
        <button onclick="alert('ฟีเจอร์เช็กยอดทำงานอัตโนมัติ')" class="flex flex-col items-center gap-1 text-slate-400 flex-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-medium">วันลาคงเหลือ</span>
        </button>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/50 flex flex-col justify-end z-50 hidden transition-all duration-300">
        <div class="bg-white rounded-t-3xl max-w-md w-full mx-auto p-5 max-h-[80vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center pb-3 border-b border-slate-100">
                <h3 class="text-base font-bold text-slate-800">ประวัติการลาของคุณ</h3>
                <button onclick="closeHistoryModal()" class="text-slate-400 hover:text-slate-600 font-bold text-sm bg-slate-100 px-3 py-1 rounded-xl">ปิด</button>
            </div>
            <div id="historyList" class="overflow-y-auto py-3 space-y-3 flex-1 text-sm">
                <p class="text-center text-slate-400 py-10">กำลังโหลดข้อมูลประวัติการลา...</p>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ อย่าลืมใส่ค่า CONFIG อันใหม่ล่าสุดของคุณตรงนี้ครับ
        const LIFF_ID = "2010513192-BpcZHcRl"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqinmR7yLwV9cv99lxqaefe2--qhGnYH2vTeF1nc_A-EKQq-pbsitf2QQVPMxVNZK_/exec"; 

        let globalEmpId = "";
        let globalQuota = {};

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById("userPicture").src = profile.pictureUrl || "https://via.placeholder.com/150";
                    fetchEmployeeData(profile.userId, profile.displayName);
                }
            } catch (error) {
                alert("LIFF Error: " + error);
            }
        }

        function fetchEmployeeData(userId, displayName) {
            fetch(`${GAS_WEB_APP_URL}?action=getProfile&userId=${userId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("loading").classList.add("hidden");
                    if (data.status === "success") {
                        globalEmpId = data.employee.empId;
                        document.getElementById("userName").innerText = data.employee.name;
                        document.getElementById("userSubInfo").innerText = `แผนก: ${data.employee.dept} | ตำแหน่ง: ${data.employee.position}`;
                        globalQuota = data.quota;
                        updateQuotaLabel("ลาป่วย");
                    } else {
                        document.getElementById("userName").innerText = displayName;
                        alert(data.message);
                    }
                })
                .catch(err => {
                    document.getElementById("loading").classList.add("hidden");
                    alert("⚠️ เปิดแอปและดึงข้อมูลโปรไฟล์ไม่สำเร็จเนื่องจากติดปัญหาดึงสิทธิ์ (CORS/URL)");
                });
        }

        function updateQuotaLabel(type) {
            if (!globalQuota.sickTotal) return;
            let total = 0, used = 0;
            if (type === "ลาป่วย") { total = globalQuota.sickTotal; used = globalQuota.sickUsed; }
            else if (type === "ลากิจ") { total = globalQuota.personalTotal; used = globalQuota.personalUsed; }
            else if (type === "ลาพักร้อน") { total = globalQuota.vacationTotal; used = globalQuota.vacationUsed; }
            document.getElementById("quotaLabel").innerText = `คงเหลือ ${total - used} วัน`;
        }

        // 🌓 🌕 ฟังก์ชันคำนวณจำนวนวันลาอัตโนมัติ (เวอร์ชันเปิด-ปิดล็อกช่อง endDate อย่างสมบูรณ์)
        function calculateLeaveDays() {
            const leaveFormat = document.getElementById("leaveFormat").value;
            const startDateInput = document.getElementById("startDate").value;
            const endDateInput = document.getElementById("endDate").value;
            const totalDaysInput = document.getElementById("totalDays");

            if (!startDateInput) return;

            // 1. กรณีลา "ครึ่งวันเช้า" หรือ "ครึ่งวันบ่าย"
            if (leaveFormat === "ครึ่งวันเช้า" || leaveFormat === "ครึ่งวันบ่าย") {
                document.getElementById("endDate").value = startDateInput;
                document.getElementById("endDate").readOnly = true; 
                document.getElementById("endDate").classList.add("bg-slate-100");
                
                totalDaysInput.value = "0.5 วัน";
                return;
            }

            // 2. กรณีลา "เต็มวัน" -> ปลดล็อกทุกอย่างเพื่อให้เลือกวันที่สิ้นสุดได้เอง
            document.getElementById("endDate").disabled = false;
            document.getElementById("endDate").readOnly = false; 
            document.getElementById("endDate").classList.remove("bg-slate-100");

            // ถ้าสลับกลับมาจากครึ่งวัน ให้เคลียร์ช่องเพื่อป้องกันค่าค้างคัดลอก
            if (leaveFormat === "เต็มวัน" && totalDaysInput.value === "0.5 วัน") {
                document.getElementById("endDate").value = "";
                totalDaysInput.value = "";
            }
            
            if (!endDateInput) return;

            const start = new Date(startDateInput);
            const end = new Date(endDateInput);

            const timeDiff = end.getTime() - start.getTime();
            const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;

            if (daysDiff < 1) {
                alert("⚠️ วันที่สิ้นสุดต้องไม่มาก่อนวันที่เริ่มต้นการลาครับ");
                document.getElementById("endDate").value = "";
                totalDaysInput.value = "";
                return;
            }

            totalDaysInput.value = daysDiff + " วัน";
        }

        // 🔓 🌟 ฟังก์ชันเปิดหน้าต่างประวัติการลา และยิงข้อมูลไปขอประวัติจาก Sheets
        function openHistoryModal() {
            if (!globalEmpId) return alert("ไม่สามารถดึงประวัติได้ เนื่องจากไม่พบรหัสพนักงาน");
            
            const modal = document.getElementById("historyModal");
            modal.classList.remove("hidden");
            
            const listContainer = document.getElementById("historyList");
            listContainer.innerHTML = '<p class="text-center text-slate-400 py-10 animate-pulse">กำลังโหลดประวัติ...</p>';

            fetch(`${GAS_WEB_APP_URL}?action=getHistory&empId=${globalEmpId}`)
                .then(res => res.json())
                .then(response => {
                    if (response.status === "success" && response.data.length > 0) {
                        listContainer.innerHTML = ""; 
                        
                        response.data.forEach(item => {
                            let statusColor = "bg-yellow-100 text-yellow-700";
                            if (item.status === "อนุมัติแล้ว") statusColor = "bg-emerald-100 text-emerald-700";
                            if (item.status === "ปฏิเสธ") statusColor = "bg-rose-100 text-rose-700";

                            // ปรับการแปลงแสดงผลวันที่ให้อ่านง่ายขึ้น
                            let sDate = item.startDate ? item.startDate.split("T")[0] : "-";
                            let eDate = item.endDate ? item.endDate.split("T")[0] : "-";

                            const card = `
                                <div class="border border-slate-100 rounded-xl p-4 shadow-sm bg-slate-50">
                                    <div class="flex justify-between items-start mb-1">
                                        <div>
                                            <span class="text-[10px] font-mono text-slate-400 block">${item.requestId}</span>
                                            <span class="font-bold text-slate-700 text-sm">${item.leaveType} (${item.leaveFormat})</span>
                                        </div>
                                        <span class="text-xs px-2.5 py-0.5 rounded-full font-medium ${statusColor}">${item.status}</span>
                                    </div>
                                    <div class="text-xs text-slate-500 space-y-0.5 mt-2">
                                        <p>📅 วันที่ลา: ${sDate} ถึง ${eDate}</p>
                                        <p>⏳ จำนวน: <span class="font-semibold text-slate-700">${item.totalDays} วัน</span></p>
                                    </div>
                                </div>
                            `;
                            listContainer.innerHTML += card;
                        });
                    } else {
                        listContainer.innerHTML = '<p class="text-center text-slate-400 py-10">🌴 ยังไม่มีประวัติการลาในระบบ</p>';
                    }
                })
                .catch(err => {
                    listContainer.innerHTML = '<p class="text-center text-rose-500 py-10">❌ เกิดข้อผิดพลาดในการดึงข้อมูล</p>';
                });
        }

        // 🔒 ฟังก์ชันสั่งซ่อนหน้าต่างป๊อปอัปประวัติ
        function closeHistoryModal() {
            document.getElementById("historyModal").classList.add("hidden");
        }

        // 🔌 สั่งเชื่อมสายไฟดักจับสัญญาณเพื่อคำนวณ Real-time
        document.getElementById("leaveFormat").addEventListener("change", calculateLeaveDays);
        document.getElementById("startDate").addEventListener("change", calculateLeaveDays);
        document.getElementById("endDate").addEventListener("change", calculateLeaveDays);
        
        document.getElementById("leaveType").addEventListener("change", function() { 
            updateQuotaLabel(this.value); 
            calculateLeaveDays();
        });

        document.getElementById("leaveForm").addEventListener("submit", function(e) {
            e.preventDefault();
            if (!globalEmpId) return alert("ไม่สามารถทำรายการได้");
            document.getElementById("loading").classList.remove("hidden");

            const formData = {
                action: "submitLeave",
                empId: globalEmpId,
                leaveType: document.getElementById("leaveType").value,
                leaveFormat: document.getElementById("leaveFormat").value,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value, 
                totalDays: parseFloat(document.getElementById("totalDays").value.replace(" วัน", "")),
                reason: document.getElementById("reason").value
            };

            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(formData)
            })
            .then(() => {
                document.getElementById("loading").classList.add("hidden");
                alert("ส่งคำขอเรียบร้อยแล้ว!\nระบบกำลังบันทึกข้อมูลและแจ้งเตือนหัวหน้า...");
                if (liff.isInClient()) liff.closeWindow();
            })
            .catch(err => {
                document.getElementById("loading").classList.add("hidden");
                alert("ส่งคำขอสำเร็จเรียบร้อยแล้ว");
                if (liff.isInClient()) liff.closeWindow();
            });
        });

        window.onload = initLiff;
    </script>
</body>
</html>
