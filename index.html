<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลาออนไลน์</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f6fa] text-slate-800 antialiased pb-24">

    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="w-10 h-10 border-4 border-[#1e40af] border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-3 text-slate-400 text-xs">กำลังโหลด...</p>
    </div>

    <div class="bg-[#1e40af] text-white px-5 py-4 flex items-center gap-3 shadow-sm">
        <img id="userPicture" src="https://via.placeholder.com/150" alt="Avatar" class="w-12 h-12 rounded-2xl border border-white/20 object-cover bg-white">
        <div>
            <h1 class="text-sm font-semibold tracking-wide">ระบบลาออนไลน์1</h1>
            <p id="userName" class="text-xs text-blue-200 mt-0.5">กำลังโหลดชื่อ...</p>
        </div>
    </div>

    <main class="px-4 py-4 max-w-md mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h2 class="text-base font-bold text-slate-800 mb-4">ยื่นใบลา</h2>
            
            <form id="leaveForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">ประเภทการลา</label>
                    <select id="leaveType" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500 appearance-none" required>
                        <option value="ลาป่วย">ลาป่วย</option>
                        <option value="ลากิจ">ลากิจ</option>
                        <option value="ลาพักร้อน">ลาพักร้อน</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label id="quotaLabel" class="block text-xs font-medium text-slate-500">คงเหลือ -- วัน รูปแบบ</label>
                    </div>
                    <select id="leaveFormat" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                        <option value="เต็มวัน">เต็มวัน</option>
                        <option value="ครึ่งวันเช้า">ครึ่งวันเช้า</option>
                        <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">วันเริ่ม</label>
                        <input type="date" id="startDate" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">วันสิ้นสุด</label>
                        <input type="date" id="endDate" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">จำนวนวันลา</label>
                    <div class="relative">
                        <input type="number" id="totalDays" step="0.5" min="0.5" placeholder="-" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 focus:outline-none text-right pr-4" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">เหตุผล</label>
                    <textarea id="reason" rows="3" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500" required></textarea>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">ผู้ติดต่อระหว่างลา</label>
                    <input type="text" id="contactPerson" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">เอกสารแนบ <span class="text-red-500 font-normal">(ต้องแนบ)</span></label>
                    <input type="file" id="fileAttachment" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                </div>

                <button type="submit" class="w-full bg-[#1e40af] hover:bg-blue-800 text-white font-medium py-3 rounded-xl shadow-sm transition text-sm mt-4">
                    ส่งใบลาไปยังผู้อนุมัติ
                </button>
            </form>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 shadow-lg px-6 py-2 flex justify-between items-center max-w-md mx-auto z-40">
        <button class="flex flex-col items-center gap-1 text-[#1e40af] flex-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span class="text-[10px] font-medium">ยื่นลา</span>
        </button>
        <button onclick="alert('ฟีเจอร์ประวัติกำลังพัฒนาในขั้นตอนถัดไป')" class="flex flex-col items-center gap-1 text-slate-400 flex-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-medium">ประวัติ</span>
        </button>
        <button onclick="alert('ฟีเจอร์เช็กวันลาคงเหลือทำงานอัตโนมัติที่หน้าแรก')" class="flex flex-col items-center gap-1 text-slate-400 flex-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-medium">คงเหลือ</span>
        </button>
    </div>

    <script>
        // ⚠️ อย่าลืมนำค่าของคุณมาใส่แทนที่ตรงนี้เหมือนเดิมครับ
        const LIFF_ID = "2010513192-BpcZHcRl"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz8wHQgW9Z4MoWqbMa1Je_024uoDnWQIYDW6gjAg4Eh_1RLpKkYFMR9UBd-PEekdwz8/exec";

        let globalEmpId = "";
        let globalQuota = {};

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById("userPicture").src = profile.pictureUrl || "https://via.placeholder.com/150";
                    fetchEmployeeData(profile.userId, profile.displayName);
                }
            } catch (error) {
                alert("LIFF Init Error: " + error);
            }
        }

        function fetchEmployeeData(userId, displayName) {
            fetch(`${GAS_WEB_APP_URL}?action=getProfile&userId=${userId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("loading").classList.add("hidden");
                    if (data.status === "success") {
                        globalEmpId = data.employee.empId;
                        document.getElementById("userName").innerText = data.employee.name;
                        globalQuota = data.quota;
                        
                        // เริ่มต้นแสดงผลโควตาของประเภทลาแรก (ลาป่วย)
                        updateQuotaLabel("ลาป่วย");
                    } else {
                        document.getElementById("userName").innerText = displayName;
                        alert(data.message + "\nUser ID: " + userId);
                    }
                })
                .catch(err => {
                    document.getElementById("loading").classList.add("hidden");
                    alert("Error: " + err);
                });
        }

        // อัปเดตตัวเลขคงเหลือแบบไดนามิกตามประเภทที่เลือก เช่น "คงเหลือ 28 วัน"
        function updateQuotaLabel(type) {
            if (!globalQuota.sickTotal) return;
            let total = 0, used = 0;
            if (type === "ลาป่วย") { total = globalQuota.sickTotal; used = globalQuota.sickUsed; }
            else if (type === "ลากิจ") { total = globalQuota.personalTotal; used = globalQuota.personalUsed; }
            else if (type === "ลาพักร้อน") { total = globalQuota.vacationTotal; used = globalQuota.vacationUsed; }
            
            const remaining = total - used;
            document.getElementById("quotaLabel").innerText = `คงเหลือ ${remaining} วัน รูปแบบ`;
        }

        // ตรวจจับการเปลี่ยนประเภทการลาเพื่ออัปเดตตัวเลขคงเหลือ
        document.getElementById("leaveType").addEventListener("change", function() {
            updateQuotaLabel(this.value);
        });

        // บันทึกฟอร์ม
        document.getElementById("leaveForm").addEventListener("submit", function(e) {
            e.preventDefault();
            if (!globalEmpId) return alert("ไม่สามารถทำรายการได้");

            document.getElementById("loading").classList.remove("hidden");

            const formData = {
                action: "submitLeave",
                empId: globalEmpId,
                leaveType: document.getElementById("leaveType").value,
                leaveFormat: document.getElementById("leaveFormat").value,
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                totalDays: parseFloat(document.getElementById("totalDays").value),
                reason: document.getElementById("reason").value,
                contact: document.getElementById("contactPerson").value
            };

            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(formData)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("loading").classList.add("hidden");
                if (data.status === "success") {
                    alert(`ส่งใบลาสำเร็จ!\nเลขที่ใบลา: ${data.requestId}`);
                    liff.closeWindow();
                } else {
                    alert("ล้มเหลว: " + data.message);
                }
            })
            .catch(err => {
                document.getElementById("loading").classList.add("hidden");
                alert("Error sending request: " + err);
            });
        });

        window.onload = function() {
            initLiff();
        };
    </script>
</body>
</html>
