<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลาออนไลน์</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-500 text-sm">กำลังโหลดข้อมูลระบบลา...</p>
    </div>

    <div class="bg-blue-700 text-white px-4 pt-6 pb-20 rounded-b-[2rem] shadow-md">
        <div class="flex items-center gap-4 max-w-md mx-auto">
            <img id="userPicture" src="https://via.placeholder.com/150" alt="Profile" class="w-14 h-14 rounded-full border-2 border-white shadow">
            <div>
                <p class="text-xs text-blue-200">ยินดีต้อนรับ</p>
                <h1 id="userName" class="text-lg font-bold leading-tight">กำลังโหลดชื่อ...</h1>
                <p id="userDept" class="text-xs text-blue-100 mt-0.5">แผนก: -</p>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 -mt-14 mb-24">
        
        <section class="bg-white rounded-2xl p-4 shadow-sm mb-6 border border-slate-100">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                📊 สิทธิ์วันลาคงเหลือของคุณ
            </h2>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="font-medium">ลาป่วย (Sick Leave)</span>
                        <span id="sickTxt" class="text-slate-500">0/0 วัน</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="sickBar" class="bg-red-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="font-medium">ลากิจ (Personal Leave)</span>
                        <span id="personalTxt" class="text-slate-500">0/0 วัน</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="personalBar" class="bg-amber-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="font-medium">ลาพักร้อน (Vacation)</span>
                        <span id="vacationTxt" class="text-slate-500">0/0 วัน</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="vacationBar" class="bg-emerald-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                ✍️ กรอกฟอร์มยื่นใบลา
            </h2>
            <form id="leaveForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">ประเภทการลา</label>
                    <select id="leaveType" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-slate-50 focus:outline-none focus:border-blue-500" required>
                        <option value="ลาป่วย">ลาป่วย</option>
                        <option value="ลากิจ">ลากิจ</option>
                        <option value="ลาพักร้อน">ลาพักร้อน</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">วันเริ่มลา</label>
                        <input type="date" id="startDate" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-slate-50 focus:outline-none focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">วันสิ้นสุด</label>
                        <input type="date" id="endDate" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-slate-50 focus:outline-none focus:border-blue-500" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">จำนวนวันลา</label>
                    <input type="number" id="totalDays" step="0.5" min="0.5" placeholder="เช่น 1 หรือ 0.5" class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-slate-50 focus:outline-none focus:border-blue-500" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">เหตุผลการลา</label>
                    <textarea id="reason" rows="3" placeholder="ระบุเหตุผลความจำเป็น..." class="w-full border border-slate-200 rounded-xl p-2.5 text-sm bg-slate-50 focus:outline-none focus:border-blue-500" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition text-sm mt-2">
                    ส่งใบลาไปยังผู้อนุมัติ
                </button>
            </form>
        </section>
    </main>

    <script>
        // CONFIG: นำค่าจากสเต็ปเก่าของคุณมาวางที่นี่
        const LIFF_ID = "2010513192-BpcZHcRl"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz8wHQgW9Z4MoWqbMa1Je_024uoDnWQIYDW6gjAg4Eh_1RLpKkYFMR9UBd-PEekdwz8/exec"; 

        let globalEmpId = ""; // ตัวแปรเก็บรหัสพนักงานที่ได้จากฐานข้อมูล

        // 1. เริ่มต้นการทำงานของ LINE LIFF เมื่อเปิดหน้าจอขึ้นมา
        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login(); // ถ้าพนักงานยังไม่ได้ล็อกอิน ให้บังคับล็อกอินผ่าน LINE
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById("userPicture").src = profile.pictureUrl || "https://via.placeholder.com/150";
                    
                    // เรียกฟังก์ชันดึงข้อมูลพนักงานและโควตาวันลาจาก Google Sheets (ผ่าน GAS)
                    fetchEmployeeData(profile.userId, profile.displayName);
                }
            } catch (error) {
                console.error("LIFF Initialization failed", error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ LINE: " + error);
            }
        }

        // 2. ยิง API ไปดึงข้อมูลที่ Google Sheets จาก UserId ของ LINE
        function fetchEmployeeData(userId, displayName) {
            const url = `${GAS_WEB_APP_URL}?action=getProfile&userId=${userId}`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("loading").classList.add("hidden"); // ซ่อนหน้าจอ Loading
                    
                    if (data.status === "success") {
                        globalEmpId = data.employee.empId;
                        document.getElementById("userName").innerText = data.employee.name;
                        document.getElementById("userDept").innerText = `แผนก: ${data.employee.dept} (${globalEmpId})`;
                        
                        // อัปเดตข้อมูลบนความคืบหน้า (Progress Bar)
                        updateQuotaUI(data.quota);
                    } else {
                        // กรณีไม่พบข้อมูลพนักงานในตาราง Employee_DB (เช่น ยังไม่ได้กรอกข้อมูลหรือ LINE ID ไม่ตรง)
                        document.getElementById("userName").innerText = displayName;
                        document.getElementById("userDept").innerText = "⚠️ ไม่พบรายชื่อคุณในระบบติดต่อ HR";
                        alert(data.message + "\n(กรุณาเพิ่ม LINE User ID นี้ใน Sheet พนักงาน: " + userId + ")");
                        console.log("LINE User ID ของคุณคือ:", userId);
                    }
                })
                .catch(err => {
                    alert("ดึงข้อมูลไม่สำเร็จ: " + err);
                    document.getElementById("loading").classList.add("hidden");
                });
        }

        // 3. ฟังก์ชันคำนวณและวาดเปอร์เซ็นต์บนความคืบหน้า
        function updateQuotaUI(quota) {
            // คำนวณ ลาป่วย
            const sickPercent = (quota.sickUsed / quota.sickTotal) * 100;
            document.getElementById("sickTxt").innerText = `${quota.sickUsed}/${quota.sickTotal} วัน`;
            document.getElementById("sickBar").style.width = `${Math.min(sickPercent, 100)}%`;

            // คำนวณ ลากิจ
            const personalPercent = (quota.personalUsed / quota.personalTotal) * 100;
            document.getElementById("personalTxt").innerText = `${quota.personalUsed}/${quota.personalTotal} วัน`;
            document.getElementById("personalBar").style.width = `${Math.min(personalPercent, 100)}%`;

            // คำนวณ ลาพักร้อน
            const vacationPercent = (quota.vacationUsed / quota.vacationTotal) * 100;
            document.getElementById("vacationTxt").innerText = `${quota.vacationUsed}/${quota.vacationTotal} วัน`;
            document.getElementById("vacationBar").style.width = `${Math.min(vacationPercent, 100)}%`;
        }

        // 4. จัดการเหตุการณ์เมื่อพนักงานกดปุ่ม "ส่งใบลา"
        document.getElementById("leaveForm").addEventListener("submit", function(e) {
            e.preventDefault();
            if (!globalEmpId) {
                alert("ไม่สามารถยื่นใบลาได้ เนื่องจากไม่พบข้อมูลพนักงานในระบบ");
                return;
            }

            const formData = {
                action: "submitLeave",
                empId: globalEmpId,
                leaveType: document.getElementById("leaveType").value,
                leaveFormat: "เต็มวัน", // สามารถเพิ่มประเภทครึ่งวันได้ภายหลัง
                startDate: document.getElementById("startDate").value,
                endDate: document.getElementById("endDate").value,
                totalDays: parseFloat(document.getElementById("totalDays").value),
                reason: document.getElementById("reason").value
            };

            // แสดงสถานะว่ากำลังส่งข้อมูล
            document.getElementById("loading").classList.remove("hidden");

            // ยิงข้อมูล POST ไปบันทึกใน Google Sheets
            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(formData)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("loading").classList.add("hidden");
                if (data.status === "success") {
                    alert(`ยื่นใบลาสำเร็จแล้ว!\nเลขที่ใบลาของคุณคือ: ${data.requestId}`);
                    liff.closeWindow(); // ปิดหน้าต่าง LINE LIFF ทันทีเมื่อลาเสร็จ
                } else {
                    alert("เกิดข้อผิดพลาด: " + data.message);
                }
            })
            .catch(err => {
                document.getElementById("loading").classList.add("hidden");
                alert("ส่งข้อมูลล้มเหลว: " + err);
            });
        });

        // เปิดใช้งานระบบ LIFF เมื่อพร้อมใช้งาน
        window.onload = function() {
            initLiff();
        };
    </script>
</body>
</html>
